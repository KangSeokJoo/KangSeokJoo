name: update snake Animation
on:
  schedule:
    # 1주일
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  buildSnake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          # github user name to read the contribution graph from (**required**)
          # using action context var `github.repository_owner` or specified user
          github_user_name: KangSeokJoo
          # list of files to generate.
          # one file per line. Each output can be customized with options as query string.
          #
          #  supported options:
          #  - palette:     A preset of color, one of [github, github-dark, github-light]
          #  - color_snake: Color of the snake
          #  - color_dots:  Coma separated list of dots color.
          #                 The first one is 0 contribution, then it goes from the low contribution to the highest.
          #                 Exactly 5 colors are expected.
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          # the output branch we mentioned above
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  updateReadme:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update README.md
        run: |
          BRANCH_NAME="refs/heads/output" 
          SVG_FILE="github-snake-dark.svg" 
          SVG_LINK="https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH_NAME}/${SVG_FILE}"

          sed -i '$d' README.md
          echo "![SVG Link]($SVG_LINK)" >> README.md

      - name: Commit changes
        run: |
          git add *
          git commit -m "Update contributed counts to repository"
          git push --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}